name: 🦖 행사 추가 요청
description: 새로운 아시아 AI/블록체인 행사를 추가해주세요
title: "[행사 추가] "
labels: ["event-request"]
body:
  - type: input
    id: name
    attributes:
      label: 행사명
      placeholder: "예: Token2049 Singapore"
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: 카테고리
      options:
        - ai
        - blockchain
        - both
    validations:
      required: true

  - type: input
    id: date_start
    attributes:
      label: 시작일
      placeholder: "YYYY-MM-DD (예: 2025-09-30)"
    validations:
      required: true

  - type: input
    id: date_end
    attributes:
      label: 종료일
      placeholder: "YYYY-MM-DD (예: 2025-10-01)"
    validations:
      required: true

  - type: dropdown
    id: confirmed
    attributes:
      label: 날짜 확정 여부
      options:
        - "true"
        - "false"
    validations:
      required: true

  - type: input
    id: city
    attributes:
      label: 도시
      placeholder: "예: Singapore"
    validations:
      required: true

  - type: dropdown
    id: country
    attributes:
      label: 국가
      options:
        - "🇸🇬 Singapore"
        - "🇰🇷 South Korea"
        - "🇯🇵 Japan"
        - "🇭🇰 Hong Kong"
        - "🇹🇼 Taiwan"
        - "🇹🇭 Thailand"
        - "🇮🇳 India"
        - "🇦🇪 UAE"
    validations:
      required: true

  - type: input
    id: url
    attributes:
      label: 공식 웹사이트 URL
      placeholder: "https://..."
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: 행사 설명
      placeholder: 한 줄 설명
    validations:
      required: true

  - type: input
    id: tags
    attributes:
      label: 태그 (쉼표 구분)
      placeholder: "crypto, web3, defi"
