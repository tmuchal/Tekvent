name: Monthly Events Update

on:
  schedule:
    # 매월 1일 오전 9시 (KST = UTC+9, 즉 UTC 00:00)
    - cron: '0 0 1 * *'
  workflow_dispatch: # 수동으로도 실행 가능

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  archive-past-events:
    name: Archive Past Events
    runs-on: ubuntu-latest
    outputs:
      archived_count: ${{ steps.archive.outputs.archived_count }}
      pr_url: ${{ steps.create-pr.outputs.pull-request-url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run archive script
        id: archive
        run: |
          OUTPUT=$(npx ts-node --project tsconfig.scripts.json scripts/archive-past-events.ts 2>&1)
          echo "$OUTPUT"
          COUNT=$(echo "$OUTPUT" | grep -oP '\d+(?=개 행사 아카이브)' || echo "0")
          echo "archived_count=$COUNT" >> $GITHUB_OUTPUT

      - name: Check for changes
        id: check-changes
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Create PR for archived events
        id: create-pr
        if: steps.check-changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: archive ${{ steps.archive.outputs.archived_count }} past events"
          title: "🗂️ 지난 행사 아카이브 (${{ steps.archive.outputs.archived_count }}개)"
          body: |
            ## 자동 아카이브

            이 PR은 종료된 행사를 `events.json`에서 `events-archive.json`으로 이동합니다.

            - 아카이브된 행사 수: **${{ steps.archive.outputs.archived_count }}개**
            - 기준: 오늘(`${{ github.run_started_at }}`) 이전에 종료된 행사

            변경 내역을 확인하고 문제 없으면 **Merge** 해주세요.
          branch: auto/archive-past-events
          delete-branch: true

  create-update-issue:
    name: Create Monthly Update Issue
    runs-on: ubuntu-latest
    needs: archive-past-events

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get current month info
        id: date
        run: |
          echo "year=$(date +%Y)" >> $GITHUB_OUTPUT
          echo "month=$(date +%m)" >> $GITHUB_OUTPUT
          echo "month_name=$(LC_TIME=ko_KR.UTF-8 date +%B 2>/dev/null || date +%B)" >> $GITHUB_OUTPUT
          echo "next_6months=$(date -d '+6 months' +%Y-%m)" >> $GITHUB_OUTPUT

      - name: Create monthly update issue
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const year = '${{ steps.date.outputs.year }}';
            const month = '${{ steps.date.outputs.month }}';
            const next6 = '${{ steps.date.outputs.next_6months }}';
            const archivedCount = '${{ needs.archive-past-events.outputs.archived_count }}';
            const prUrl = '${{ needs.archive-past-events.outputs.pr_url }}';

            const archiveNote = archivedCount > 0
              ? `\n> ✅ 이번 달 **${archivedCount}개** 행사가 자동으로 아카이브되었습니다. [PR 확인](${prUrl})\n`
              : '\n> ℹ️ 이번 달 아카이브할 행사가 없었습니다.\n';

            const body = `## ${year}년 ${month}월 행사 업데이트 체크리스트

            ${archiveNote}

            ### 📋 새 행사 추가 시 확인할 사이트

            #### AI 행사
            - [ ] [AI Summit](https://theaisummit.com/events/) - 글로벌 AI 서밋
            - [ ] [World Summit AI](https://worldsummit.ai/) - 암스테르담/기타 AI 서밋
            - [ ] [GTC (NVIDIA)](https://www.nvidia.com/gtc/) - NVIDIA GPU Technology Conference
            - [ ] [re:Invent / AWS Events](https://aws.amazon.com/events/)
            - [ ] [Google I/O](https://io.google/)
            - [ ] [Microsoft Build](https://build.microsoft.com/)

            #### Web3 / 블록체인 행사
            - [ ] [Consensus](https://consensus.coindesk.com/) - CoinDesk Consensus
            - [ ] [Token2049](https://www.token2049.com/) - 싱가포르/두바이
            - [ ] [Korea Blockchain Week](https://koreablockchainweek.com/)
            - [ ] [Blockchain Expo](https://blockchain-expo.com/)

            #### 이벤트 종합 사이트
            - [ ] [lu.ma](https://lu.ma/explore) - 검색: "AI Asia", "blockchain Korea"
            - [ ] [Eventbrite](https://www.eventbrite.com/) - 검색: "AI summit Asia ${year}"
            - [ ] [10times.com](https://10times.com/technology-events?location=asia)

            ### 📝 행사 추가 방법

            \`public/events.json\` 파일에 아래 형식으로 추가 후 PR을 올려주세요:

            \`\`\`json
            {
              "id": "event-name-${year}",
              "name": "행사 이름",
              "category": "ai",
              "date_start": "${year}-MM-DD",
              "date_end": "${year}-MM-DD",
              "country": "Korea",
              "country_flag": "🇰🇷",
              "city": "Seoul",
              "url": "https://event-url.com",
              "description": "행사 설명",
              "tags": ["ai", "korea"],
              "confirmed": true
            }
            \`\`\`

            > **카테고리**: \`ai\` / \`blockchain\` / \`both\`

            ---
            *이 이슈는 매월 1일 자동으로 생성됩니다.*`;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `📅 [${year}년 ${month}월] 행사 목록 업데이트 요청`,
              body: body,
              labels: ['events', 'monthly-update']
            });
