<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="64" height="64" shape-rendering="crispEdges">
  <!-- Body -->
  <rect x="4" y="4" width="8" height="9" fill="#1a1a2e"/>
  <!-- White belly -->
  <rect x="5" y="6" width="6" height="6" fill="#f5f5f5"/>
  <!-- Head -->
  <rect x="4" y="2" width="8" height="4" fill="#1a1a2e"/>
  <!-- Eyes -->
  <rect x="5" y="3" width="2" height="2" fill="#f5f5f5"/>
  <rect x="9" y="3" width="2" height="2" fill="#f5f5f5"/>
  <rect x="6" y="3" width="1" height="1" fill="#1a1a2e"/>
  <rect x="10" y="3" width="1" height="1" fill="#1a1a2e"/>
  <!-- Eye shine -->
  <rect x="5" y="3" width="1" height="1" fill="#ffffff"/>
  <rect x="9" y="3" width="1" height="1" fill="#ffffff"/>
  <!-- Beak -->
  <rect x="7" y="5" width="2" height="1" fill="#f5a623"/>
  <!-- Wings -->
  <rect x="2" y="5" width="2" height="5" fill="#1a1a2e"/>
  <rect x="12" y="5" width="2" height="5" fill="#1a1a2e"/>
  <!-- Feet -->
  <rect x="4" y="13" width="3" height="1" fill="#f5a623"/>
  <rect x="9" y="13" width="3" height="1" fill="#f5a623"/>
  <rect x="3" y="14" width="4" height="1" fill="#f5a623"/>
  <rect x="9" y="14" width="4" height="1" fill="#f5a623"/>
  <!-- Cheek blush -->
  <rect x="4" y="6" width="1" height="1" fill="#ffb3ba"/>
  <rect x="11" y="6" width="1" height="1" fill="#ffb3ba"/>
</svg>
