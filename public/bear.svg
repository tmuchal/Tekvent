<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" shape-rendering="crispEdges">
  <!-- Baby Polar Bear Pixel Art 32x32 -->

  <!-- Left ear outer -->
  <rect x="4" y="2" width="2" height="1" fill="#F0F0F0"/>
  <rect x="3" y="3" width="4" height="2" fill="#F0F0F0"/>
  <!-- Left ear inner -->
  <rect x="4" y="3" width="2" height="1" fill="#87CEEB"/>

  <!-- Right ear outer -->
  <rect x="26" y="2" width="2" height="1" fill="#F0F0F0"/>
  <rect x="25" y="3" width="4" height="2" fill="#F0F0F0"/>
  <!-- Right ear inner -->
  <rect x="26" y="3" width="2" height="1" fill="#87CEEB"/>

  <!-- Head row 5 -->
  <rect x="5" y="5" width="22" height="1" fill="#F0F0F0"/>
  <!-- Head row 6 -->
  <rect x="4" y="6" width="24" height="1" fill="#F0F0F0"/>
  <!-- Head row 7 -->
  <rect x="3" y="7" width="26" height="1" fill="#F0F0F0"/>
  <!-- Head row 8 -->
  <rect x="3" y="8" width="26" height="1" fill="#F0F0F0"/>
  <!-- Head row 9 - eyes row -->
  <rect x="3" y="9" width="26" height="1" fill="#F0F0F0"/>
  <!-- Eyes -->
  <rect x="9" y="9" width="2" height="2" fill="#333333"/>
  <rect x="21" y="9" width="2" height="2" fill="#333333"/>
  <!-- Eye shine -->
  <rect x="10" y="9" width="1" height="1" fill="#FFFFFF"/>
  <rect x="22" y="9" width="1" height="1" fill="#FFFFFF"/>

  <!-- Head row 10 -->
  <rect x="3" y="10" width="26" height="1" fill="#F0F0F0"/>
  <!-- Cheek blush -->
  <rect x="6" y="10" width="3" height="1" fill="#FFB3B3"/>
  <rect x="23" y="10" width="3" height="1" fill="#FFB3B3"/>

  <!-- Nose row 11 -->
  <rect x="3" y="11" width="26" height="1" fill="#F0F0F0"/>
  <rect x="14" y="11" width="4" height="1" fill="#D4D4D4"/>
  <!-- Nose -->
  <rect x="15" y="12" width="2" height="2" fill="#333333"/>

  <!-- Head row 12 -->
  <rect x="4" y="12" width="24" height="1" fill="#F0F0F0"/>
  <!-- Head row 13 -->
  <rect x="5" y="13" width="22" height="1" fill="#F0F0F0"/>
  <!-- Mouth -->
  <rect x="14" y="13" width="1" height="1" fill="#D4D4D4"/>
  <rect x="17" y="13" width="1" height="1" fill="#D4D4D4"/>

  <!-- Neck / upper body -->
  <rect x="9" y="14" width="14" height="1" fill="#F0F0F0"/>
  <rect x="8" y="15" width="16" height="1" fill="#F0F0F0"/>

  <!-- Body row 16-17 -->
  <rect x="5" y="16" width="22" height="1" fill="#F0F0F0"/>
  <rect x="4" y="17" width="24" height="1" fill="#F0F0F0"/>

  <!-- Arms -->
  <rect x="2" y="17" width="3" height="4" fill="#F0F0F0"/>
  <rect x="27" y="17" width="3" height="4" fill="#F0F0F0"/>
  <!-- Arm shadow -->
  <rect x="2" y="19" width="3" height="2" fill="#D4D4D4"/>
  <rect x="27" y="19" width="3" height="2" fill="#D4D4D4"/>

  <!-- Body rows 18-22 -->
  <rect x="3" y="18" width="26" height="1" fill="#F0F0F0"/>
  <rect x="3" y="19" width="26" height="1" fill="#F0F0F0"/>
  <!-- Belly -->
  <rect x="10" y="19" width="12" height="4" fill="#87CEEB"/>

  <rect x="3" y="20" width="26" height="1" fill="#F0F0F0"/>
  <rect x="10" y="20" width="12" height="1" fill="#87CEEB"/>
  <rect x="3" y="21" width="26" height="1" fill="#F0F0F0"/>
  <rect x="10" y="21" width="12" height="1" fill="#87CEEB"/>
  <rect x="3" y="22" width="26" height="1" fill="#F0F0F0"/>
  <rect x="10" y="22" width="12" height="1" fill="#87CEEB"/>

  <!-- Lower body -->
  <rect x="4" y="23" width="24" height="1" fill="#F0F0F0"/>
  <rect x="5" y="24" width="22" height="1" fill="#F0F0F0"/>
  <!-- Shadow under body -->
  <rect x="6" y="24" width="20" height="1" fill="#D4D4D4"/>

  <!-- Legs -->
  <rect x="8" y="25" width="6" height="1" fill="#F0F0F0"/>
  <rect x="18" y="25" width="6" height="1" fill="#F0F0F0"/>
  <rect x="8" y="26" width="6" height="1" fill="#F0F0F0"/>
  <rect x="18" y="26" width="6" height="1" fill="#F0F0F0"/>
  <rect x="8" y="27" width="6" height="1" fill="#D4D4D4"/>
  <rect x="18" y="27" width="6" height="1" fill="#D4D4D4"/>

  <!-- Paws -->
  <rect x="7" y="28" width="8" height="2" fill="#F0F0F0"/>
  <rect x="17" y="28" width="8" height="2" fill="#F0F0F0"/>
  <rect x="7" y="29" width="8" height="1" fill="#D4D4D4"/>
  <rect x="17" y="29" width="8" height="1" fill="#D4D4D4"/>
  <!-- Paw toes -->
  <rect x="7" y="28" width="2" height="2" fill="#D4D4D4"/>
  <rect x="10" y="28" width="2" height="2" fill="#D4D4D4"/>
  <rect x="13" y="28" width="2" height="2" fill="#D4D4D4"/>
  <rect x="17" y="28" width="2" height="2" fill="#D4D4D4"/>
  <rect x="20" y="28" width="2" height="2" fill="#D4D4D4"/>
  <rect x="23" y="28" width="2" height="2" fill="#D4D4D4"/>
</svg>
