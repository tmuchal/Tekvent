<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <!-- Ears -->
  <circle cx="22" cy="20" r="10" fill="#E8E8E8"/>
  <circle cx="58" cy="20" r="10" fill="#E8E8E8"/>
  <circle cx="22" cy="20" r="6" fill="#F9CDCD"/>
  <circle cx="58" cy="20" r="6" fill="#F9CDCD"/>

  <!-- Head -->
  <ellipse cx="40" cy="36" rx="26" ry="24" fill="#F5F5F5"/>

  <!-- Eyes -->
  <circle cx="30" cy="32" r="5" fill="#1A1A2E"/>
  <circle cx="50" cy="32" r="5" fill="#1A1A2E"/>
  <!-- Eye shine -->
  <circle cx="32" cy="30" r="1.8" fill="white"/>
  <circle cx="52" cy="30" r="1.8" fill="white"/>

  <!-- Cheek blush -->
  <ellipse cx="20" cy="40" rx="6" ry="4" fill="#FFB3BA" opacity="0.6"/>
  <ellipse cx="60" cy="40" rx="6" ry="4" fill="#FFB3BA" opacity="0.6"/>

  <!-- Muzzle -->
  <ellipse cx="40" cy="44" rx="12" ry="9" fill="#E0E0E0"/>
  <!-- Nose -->
  <ellipse cx="40" cy="40" rx="5" ry="3.5" fill="#1A1A2E"/>
  <!-- Nose shine -->
  <ellipse cx="38.5" cy="39" rx="1.5" ry="1" fill="white" opacity="0.6"/>
  <!-- Smile -->
  <path d="M 34 47 Q 40 53 46 47" stroke="#1A1A2E" stroke-width="1.8" fill="none" stroke-linecap="round"/>

  <!-- Body -->
  <ellipse cx="40" cy="68" rx="22" ry="16" fill="#F0F0F0"/>
  <!-- Belly patch -->
  <ellipse cx="40" cy="70" rx="13" ry="10" fill="#ADD8E6" opacity="0.5"/>

  <!-- Paws (small) -->
  <ellipse cx="20" cy="72" rx="7" ry="5" fill="#E8E8E8"/>
  <ellipse cx="60" cy="72" rx="7" ry="5" fill="#E8E8E8"/>
</svg>
