<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 22" width="20" height="22" shape-rendering="crispEdges">
  <!-- T-Rex Pixel Art (Sleeping) - same layout, eyes closed + Zzz -->
  <!-- DG=#3A7D2E, LG=#8DC63F, CL=#166534 (closed eye line) -->

  <!-- HEAD -->
  <rect x="11" y="0" width="4" height="1" fill="#3A7D2E"/>
  <rect x="10" y="1" width="6" height="1" fill="#3A7D2E"/>
  <!-- row 2 - CLOSED eye (dark horizontal line instead of black square) -->
  <rect x="10" y="2" width="2" height="1" fill="#3A7D2E"/>
  <rect x="12" y="2" width="3" height="1" fill="#166534"/>
  <rect x="15" y="2" width="1" height="1" fill="#3A7D2E"/>
  <!-- row 3 -->
  <rect x="10" y="3" width="6" height="1" fill="#3A7D2E"/>
  <!-- row 4 -->
  <rect x="10" y="4" width="7" height="1" fill="#3A7D2E"/>
  <!-- row 5 - mouth closed (no white gap) -->
  <rect x="10" y="5" width="7" height="1" fill="#3A7D2E"/>
  <!-- row 6 -->
  <rect x="9"  y="6" width="6" height="1" fill="#3A7D2E"/>
  <!-- row 7 - neck -->
  <rect x="8"  y="7" width="4" height="1" fill="#3A7D2E"/>

  <!-- UPPER BODY + ARM -->
  <rect x="6"  y="8" width="6" height="1" fill="#3A7D2E"/>
  <rect x="12" y="8" width="3" height="1" fill="#3A7D2E"/>
  <rect x="5"  y="9" width="3" height="1" fill="#3A7D2E"/>
  <rect x="8"  y="9" width="3" height="1" fill="#8DC63F"/>
  <rect x="11" y="9" width="2" height="1" fill="#3A7D2E"/>
  <rect x="13" y="9" width="2" height="1" fill="#3A7D2E"/>
  <rect x="4"  y="10" width="3" height="1" fill="#3A7D2E"/>
  <rect x="7"  y="10" width="5" height="1" fill="#8DC63F"/>
  <rect x="12" y="10" width="2" height="1" fill="#3A7D2E"/>

  <!-- TAIL + BODY MID -->
  <rect x="0"  y="11" width="3" height="1" fill="#3A7D2E"/>
  <rect x="3"  y="11" width="2" height="1" fill="#3A7D2E"/>
  <rect x="5"  y="11" width="1" height="1" fill="#3A7D2E"/>
  <rect x="6"  y="11" width="5" height="1" fill="#8DC63F"/>
  <rect x="11" y="11" width="2" height="1" fill="#3A7D2E"/>
  <rect x="0"  y="12" width="2" height="1" fill="#3A7D2E"/>
  <rect x="2"  y="12" width="2" height="1" fill="#3A7D2E"/>
  <rect x="4"  y="12" width="2" height="1" fill="#3A7D2E"/>
  <rect x="6"  y="12" width="4" height="1" fill="#8DC63F"/>
  <rect x="10" y="12" width="2" height="1" fill="#3A7D2E"/>
  <rect x="0"  y="13" width="1" height="1" fill="#3A7D2E"/>
  <rect x="3"  y="13" width="2" height="1" fill="#3A7D2E"/>
  <rect x="5"  y="13" width="4" height="1" fill="#8DC63F"/>
  <rect x="9"  y="13" width="2" height="1" fill="#3A7D2E"/>

  <!-- LEGS -->
  <rect x="4"  y="14" width="2" height="1" fill="#3A7D2E"/>
  <rect x="7"  y="14" width="3" height="1" fill="#3A7D2E"/>
  <rect x="4"  y="15" width="2" height="1" fill="#3A7D2E"/>
  <rect x="7"  y="15" width="3" height="1" fill="#3A7D2E"/>
  <rect x="4"  y="16" width="2" height="1" fill="#3A7D2E"/>
  <rect x="7"  y="16" width="3" height="1" fill="#3A7D2E"/>
  <rect x="3"  y="17" width="3" height="1" fill="#3A7D2E"/>
  <rect x="7"  y="17" width="3" height="1" fill="#3A7D2E"/>

  <!-- FEET -->
  <rect x="2"  y="18" width="2" height="1" fill="#3A7D2E"/>
  <rect x="5"  y="18" width="1" height="1" fill="#3A7D2E"/>
  <rect x="7"  y="18" width="1" height="1" fill="#3A7D2E"/>
  <rect x="9"  y="18" width="2" height="1" fill="#3A7D2E"/>
  <rect x="2"  y="19" width="1" height="1" fill="#3A7D2E"/>
  <rect x="5"  y="19" width="1" height="1" fill="#3A7D2E"/>
  <rect x="7"  y="19" width="1" height="1" fill="#3A7D2E"/>
  <rect x="10" y="19" width="1" height="1" fill="#3A7D2E"/>

  <!-- Zzz -->
  <rect x="17" y="0" width="2" height="1" fill="#94A3B8"/>
  <rect x="16" y="1" width="1" height="1" fill="#94A3B8"/>
  <rect x="15" y="2" width="3" height="1" fill="#94A3B8"/>
</svg>
